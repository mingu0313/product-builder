<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제휴 문의</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
            --border-color: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(15, 23, 42, 0.6);
            --error-color: #f87171;
            --success-color: #4ade80;
        }

        [data-theme="light"] {
            --bg-color: #f1f5f9;
            --card-bg: rgba(255, 255, 255, 0.7);
            --accent-color: #0284c7;
            --text-color: #0f172a;
            --border-color: rgba(15, 23, 42, 0.1);
            --input-bg: rgba(255, 255, 255, 0.9);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image:
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 20px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.3rem;
            padding: 0;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            z-index: 20;
        }

        .theme-toggle:hover {
            transform: translateY(-2px) scale(1.05);
        }

        .container {
            max-width: 520px;
            width: 100%;
            z-index: 10;
        }

        h1 {
            font-size: 2.25rem;
            margin-bottom: 0.5rem;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            opacity: 0.7;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        form {
            background: var(--card-bg);
            border-radius: 1.5rem;
            padding: 2rem;
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.35);
        }

        .field {
            margin-bottom: 1.25rem;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            opacity: 0.85;
        }

        input,
        textarea {
            width: 100%;
            padding: 0.85rem 1rem;
            border-radius: 0.75rem;
            border: 1px solid var(--border-color);
            background: var(--input-bg);
            color: var(--text-color);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus,
        textarea:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        button[type="submit"] {
            width: 100%;
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
            color: white;
            border: none;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 9999px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.4);
            margin-top: 0.5rem;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(56, 189, 248, 0.5);
        }

        button[type="submit"]:active {
            transform: translateY(1px);
        }

        button[type="submit"]:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .status-message {
            margin-top: 1.25rem;
            text-align: center;
            font-weight: 600;
            font-size: 0.95rem;
            display: none;
        }

        .status-message.success {
            display: block;
            color: var(--success-color);
        }

        .status-message.error {
            display: block;
            color: var(--error-color);
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.7rem; }
            form { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" aria-label="테마 전환">🌙</button>

    <div class="container">
        <h1>제휴 문의</h1>
        <p class="subtitle">궁금하신 점이나 제휴 제안을 남겨주시면 빠르게 회신드리겠습니다.</p>

        <form id="contact-form" action="https://formspree.io/f/xdaqzlrg" method="POST">
            <div class="field">
                <label for="name">이름 / 회사명</label>
                <input type="text" id="name" name="name" required autocomplete="name">
            </div>

            <div class="field">
                <label for="email">이메일</label>
                <input type="email" id="email" name="email" required autocomplete="email">
            </div>

            <div class="field">
                <label for="message">문의 내용</label>
                <textarea id="message" name="message" required placeholder="제휴 제안 내용을 자유롭게 작성해주세요."></textarea>
            </div>

            <button type="submit" id="submit-btn">문의 보내기</button>

            <p class="status-message" id="status-message"></p>
        </form>
    </div>

    <script>
        const themeToggleBtn = document.getElementById('theme-toggle');

        function applyTheme(theme) {
            if (theme === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
                themeToggleBtn.textContent = '☀️';
            } else {
                document.documentElement.removeAttribute('data-theme');
                themeToggleBtn.textContent = '🌙';
            }
        }

        function toggleTheme() {
            const isLight = document.documentElement.getAttribute('data-theme') === 'light';
            const nextTheme = isLight ? 'dark' : 'light';
            localStorage.setItem('lotto-theme', nextTheme);
            applyTheme(nextTheme);
        }

        (function initTheme() {
            const saved = localStorage.getItem('lotto-theme');
            const prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
            applyTheme(saved || (prefersLight ? 'light' : 'dark'));
        })();

        const form = document.getElementById('contact-form');
        const submitBtn = document.getElementById('submit-btn');
        const statusMessage = document.getElementById('status-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.textContent = '전송 중...';
            statusMessage.className = 'status-message';
            statusMessage.textContent = '';

            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: new FormData(form),
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    statusMessage.textContent = '문의가 성공적으로 전송되었습니다. 감사합니다!';
                    statusMessage.className = 'status-message success';
                    form.reset();
                } else {
                    throw new Error('전송 실패');
                }
            } catch (err) {
                statusMessage.textContent = '전송에 실패했습니다. 잠시 후 다시 시도해주세요.';
                statusMessage.className = 'status-message error';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '문의 보내기';
            }
        });
    </script>
</body>
</html>
