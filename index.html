<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프리미엄 로또 추첨기</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
            --border-color: rgba(255, 255, 255, 0.1);
            --lotto-yellow: #facc15;
            --lotto-blue: #3b82f6;
            --lotto-red: #ef4444;
            --lotto-gray: #94a3b8;
            --lotto-green: #22c55e;
        }

        [data-theme="light"] {
            --bg-color: #f1f5f9;
            --card-bg: rgba(255, 255, 255, 0.7);
            --accent-color: #0284c7;
            --text-color: #0f172a;
            --border-color: rgba(15, 23, 42, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image:
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 20px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.3rem;
            padding: 0;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            z-index: 20;
        }

        .theme-toggle:hover {
            transform: translateY(-2px) scale(1.05);
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            font-weight: 800;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* Machine Area */
        .machine-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto 3rem;
            background: var(--card-bg);
            border-radius: 50%;
            border: 4px solid var(--border-color);
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 0 30px rgba(56, 189, 248, 0.2);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .machine-inner {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .ball-in-machine {
            position: absolute;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            opacity: 0.6;
            filter: blur(1px);
        }

        /* Results Area */
        .results-display {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 3rem;
            min-height: 80px;
            flex-wrap: wrap;
        }

        .ball {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.5rem;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), inset 0 -4px 6px rgba(0,0,0,0.2);
            transform: scale(0);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        .ball.show {
            transform: scale(1);
        }

        .ball::after {
            content: '';
            position: absolute;
            top: 5px;
            left: 10px;
            width: 15px;
            height: 10px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
        }

        /* Lotto Colors */
        .color-1 { background: radial-gradient(circle at 30% 30%, #fde047, #ca8a04); } /* Yellow 1-10 */
        .color-2 { background: radial-gradient(circle at 30% 30%, #60a5fa, #1d4ed8); } /* Blue 11-20 */
        .color-3 { background: radial-gradient(circle at 30% 30%, #f87171, #b91c1c); } /* Red 21-30 */
        .color-4 { background: radial-gradient(circle at 30% 30%, #94a3b8, #475569); } /* Gray 31-40 */
        .color-5 { background: radial-gradient(circle at 30% 30%, #4ade80, #15803d); } /* Green 41-45 */

        /* Controls */
        .controls {
            margin-bottom: 3rem;
        }

        button {
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1.25rem;
            font-weight: 700;
            border-radius: 9999px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(56, 189, 248, 0.5);
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* History */
        .history {
            width: 100%;
            background: var(--card-bg);
            border-radius: 1.5rem;
            padding: 2rem;
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
        }

        .history h2 {
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            opacity: 0.8;
            text-align: left;
        }

        .history-list {
            list-style: none;
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border-color);
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .history-balls {
            display: flex;
            gap: 8px;
        }

        .history-ball {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: bold;
            color: white;
        }

        .history-date {
            font-size: 0.875rem;
            opacity: 0.5;
        }

        /* Custom Scrollbar */
        .history-list::-webkit-scrollbar {
            width: 6px;
        }
        .history-list::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
        }
        .history-list::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
        }

        @media (max-width: 600px) {
            .ball { width: 45px; height: 45px; font-size: 1.1rem; }
            .machine-container { width: 220px; height: 220px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" aria-label="테마 전환">🌙</button>

    <div class="container">
        <h1>LOTTO 6/45</h1>

        <div class="machine-container" id="machine">
            <div class="machine-inner" id="machine-inner">
                <!-- Balls will be injected here by JS -->
            </div>
        </div>

        <div class="results-display" id="results">
            <!-- Drawn balls will appear here -->
        </div>

        <div class="controls">
            <button id="draw-btn" onclick="startDrawing()">번호 추첨하기</button>
        </div>

        <div class="history">
            <h2>최근 추첨 기록</h2>
            <ul class="history-list" id="history-list">
                <!-- History items will appear here -->
            </ul>
        </div>
    </div>

    <script>
        const machineInner = document.getElementById('machine-inner');
        const resultsDisplay = document.getElementById('results');
        const drawBtn = document.getElementById('draw-btn');
        const historyList = document.getElementById('history-list');
        const themeToggleBtn = document.getElementById('theme-toggle');

        let isDrawing = false;
        let balls = [];

        // Theme (dark/light) handling
        function applyTheme(theme) {
            if (theme === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
                themeToggleBtn.textContent = '☀️';
            } else {
                document.documentElement.removeAttribute('data-theme');
                themeToggleBtn.textContent = '🌙';
            }
        }

        function toggleTheme() {
            const isLight = document.documentElement.getAttribute('data-theme') === 'light';
            const nextTheme = isLight ? 'dark' : 'light';
            localStorage.setItem('lotto-theme', nextTheme);
            applyTheme(nextTheme);
        }

        (function initTheme() {
            const saved = localStorage.getItem('lotto-theme');
            const prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
            applyTheme(saved || (prefersLight ? 'light' : 'dark'));
        })();

        // Audio Context for sound effects
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSound(freq, duration, type = 'sine') {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // Initialize machine balls
        function createMachineBalls() {
            machineInner.innerHTML = '';
            balls = [];
            for (let i = 1; i <= 45; i++) {
                const ball = document.createElement('div');
                ball.className = `ball-in-machine ${getBallColorClass(i)}`;
                ball.style.left = `${Math.random() * 80 + 10}%`;
                ball.style.top = `${Math.random() * 80 + 10}%`;
                
                const angle = Math.random() * Math.PI * 2;
                const speed = 1 + Math.random() * 2;
                
                const ballObj = {
                    el: ball,
                    x: Math.random() * 250 + 25,
                    y: Math.random() * 250 + 25,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    radius: 12
                };
                
                balls.push(ballObj);
                machineInner.appendChild(ball);
            }
        }

        function getBallColorClass(num) {
            if (num <= 10) return 'color-1';
            if (num <= 20) return 'color-2';
            if (num <= 30) return 'color-3';
            if (num <= 40) return 'color-4';
            return 'color-5';
        }

        function updateMachine() {
            if (!isDrawing && balls.length === 0) return;
            
            balls.forEach(ball => {
                ball.x += ball.vx;
                ball.y += ball.vy;

                // Bounce off walls
                if (ball.x < ball.radius || ball.x > 300 - ball.radius) ball.vx *= -1;
                if (ball.y < ball.radius || ball.y > 300 - ball.radius) ball.vy *= -1;

                ball.el.style.transform = `translate(${ball.x}px, ${ball.y}px)`;
            });

            requestAnimationFrame(updateMachine);
        }

        function startDrawing() {
            if (isDrawing) return;
            initAudio();
            isDrawing = true;
            drawBtn.disabled = true;
            resultsDisplay.innerHTML = '';
            
            createMachineBalls();
            
            const numbers = [];
            while (numbers.length < 6) {
                const r = Math.floor(Math.random() * 45) + 1;
                if (numbers.indexOf(r) === -1) numbers.push(r);
            }
            numbers.sort((a, b) => a - b);

            let count = 0;
            const interval = setInterval(() => {
                if (count < 6) {
                    drawBall(numbers[count]);
                    playSound(440 + (count * 100), 0.2, 'triangle');
                    count++;
                } else {
                    clearInterval(interval);
                    isDrawing = false;
                    drawBtn.disabled = false;
                    completeDrawing(numbers);
                }
            }, 1000);
        }

        function drawBall(num) {
            const ball = document.createElement('div');
            ball.className = `ball ${getBallColorClass(num)}`;
            ball.innerText = num;
            resultsDisplay.appendChild(ball);
            
            // Small delay to trigger CSS transition
            setTimeout(() => ball.classList.add('show'), 50);
        }

        function completeDrawing(numbers) {
            // Confetti effect
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#facc15', '#3b82f6', '#ef4444', '#94a3b8', '#22c55e']
            });

            playSound(880, 0.5, 'square');
            setTimeout(() => playSound(1100, 0.5, 'square'), 100);

            saveToHistory(numbers);
        }

        function saveToHistory(numbers) {
            const now = new Date();
            const dateStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
            
            const li = document.createElement('li');
            li.className = 'history-item';
            
            let ballsHtml = '';
            numbers.forEach(n => {
                ballsHtml += `<div class="history-ball ${getBallColorClass(n)}">${n}</div>`;
            });

            li.innerHTML = `
                <div class="history-balls">${ballsHtml}</div>
                <div class="history-date">${dateStr}</div>
            `;
            
            historyList.insertBefore(li, historyList.firstChild);
            
            // Limit history to 10 items
            if (historyList.children.length > 10) {
                historyList.removeChild(historyList.lastChild);
            }
        }

        // Initialize machine balls on load
        createMachineBalls();
        updateMachine();
    </script>
</body>
</html>
